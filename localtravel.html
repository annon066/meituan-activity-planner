ink);margin-bottom:8px}.welcome-desc{font-size:14px;color:var(--muted);max-width:400px;line-height:1.7;margin-bottom:24px}.welcome-suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}.msg-row{display:flex;gap:12px;align-items:flex-start;animation:msgFadeIn .4s ease;max-width:720px}@keyframes msgFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.msg-row.is-user{flex-direction:row-reverse;margin-left:auto}.msg-avatar{width:34px;height:34px;border-radius:var(--rounded-pill);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}.msg-avatar.agent{background:var(--surface-card);color:var(--primary);border:1.5px solid rgba(204,120,92,.18)}.msg-avatar.user{background:var(--primary);color:var(--on-primary)}.msg-bubble{max-width:560px;padding:14px 18px;border-radius:var(--rounded-xl);font-size:14px;line-height:1.65;word-break:break-word}.msg-row.is-user .msg-bubble{background:var(--primary);color:var(--on-primary);border-bottom-right-radius:4px}.msg-row.is-agent .msg-bubble{background:var(--surface-soft);color:var(--body);border-bottom-left-radius:4px}.msg-time{font-size:11px;color:var(--muted-soft);margin-top:4px;text-align:right}.msg-row.is-agent .msg-time{text-align:left}.plan-card{background:var(--on-primary);border:1px solid var(--hairline);border-radius:var(--rounded-xl);padding:24px;margin-top:8px;max-width:600px;box-shadow:0 2px 16px rgba(20,20,19,.05)}.plan-card-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}.plan-card-icon{width:32px;height:32px;border-radius:var(--rounded-md);background:var(--primary-light);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:15px}.plan-card-title{font-size:16px;font-weight:600;color:var(--ink)}.plan-card-badge{font-size:11px;font-weight:500;color:var(--primary);background:var(--primary-light);padding:2px 10px;border-radius:var(--rounded-pill);margin-left:auto}.plan-card-meta{font-size:12px;color:var(--muted);margin-bottom:16px;display:flex;gap:16px}.timeline{position:relative;padding-left:28px}.timeline::before{content:'';position:absolute;left:9px;top:4px;bottom:4px;width:2px;background:var(--hairline);border-radius:1px}.timeline-item{position:relative;padding-bottom:20px}.timeline-item:last-child{padding-bottom:0}.timeline-dot{position:absolute;left:-23px;top:3px;width:14px;height:14px;border-radius:var(--rounded-pill);border:2px solid var(--primary);background:var(--canvas);z-index:1}.timeline-item.is-done .timeline-dot{background:var(--primary)}.timeline-item.is-done .timeline-dot::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--on-primary);font-weight:700}.timeline-step-time{font-size:12px;font-weight:600;color:var(--primary);margin-bottom:2px}.timeline-step-title{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:3px}.timeline-step-desc{font-size:13px;color:var(--muted);line-height:1.5}.timeline-step-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--rounded-pill);margin-top:6px;font-weight:500}.tag-green{background:#e8f5ec;color:var(--success)}.tag-orange{background:#fef3e2;color:#c07a1e}.tag-blue{background:#e8f0f8;color:#4a8bc2}.plan-actions{margin-top:20px;padding-top:18px;border-top:1px solid var(--hairline);display:flex;gap:10px;flex-wrap:wrap}.btn-execute{flex:1;min-width:140px;padding:12px 20px;border-radius:var(--rounded-md);border:none;background:var(--primary);color:var(--on-primary);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;position:relative;overflow:hidden}.btn-execute:hover:not(:disabled){background:var(--primary-active);transform:translateY(-1px);box-shadow:0 4px 12px rgba(204,120,92,.3)}.btn-execute:disabled{opacity:.7;cursor:not-allowed}.btn-execute .btn-shine{position:absolute;top:0;left:-100%;width:100%;height:100%;backg ass="modal-content" style="position:relative"><button class="modal-close" onclick="app.closeSettings()">✕</button><h3 style="font-size:18px;font-weight:600;color:var(--ink);margin-bottom:24px">设置</h3><div class="settings-section"><div class="settings-section-title"><span class="status-dot disconnected" id="statusDot"></span> API 配置</div><div class="settings-field"><label class="settings-label">LLM Base URL</label><input class="settings-input" id="cfgBaseUrl" placeholder="https://api.openai.com/v1"></div><div class="settings-field"><label class="settings-label">API Key</label><div class="settings-input-group"><input class="settings-input" id="cfgApiKey" type="password" placeholder="sk-..."><button onclick="app.toggleKeyVis()" style="padding:8px 12px;border:1px solid var(--hairline);border-radius:var(--rounded-md);background:none;cursor:pointer;font-size:12px;color:var(--muted)">👁</button></div></div><div class="settings-field"><label class="settings-label">模型名称</label><input class="settings-input" id="cfgModel" placeholder="gpt-4o-mini"></div><button class="settings-btn" onclick="app.saveConfig()" style="width:100%;margin-top:8px">保存并测试连接</button></div><div class="settings-section"><div class="settings-section-title">👤 用户信息</div><div class="settings-field"><label class="settings-label">昵称</label><input class="settings-input" id="cfgNickname" placeholder="小明" oninput="app.saveUserInfo()"></div><div class="settings-field"><label class="settings-label">手机号（用于预订）</label><input class="settings-input" id="cfgPhone" placeholder="138xxxx" oninput="app.saveUserInfo()"></div><div class="settings-field"><label class="settings-label">家庭地址/出发地</label><input class="settings-input" id="cfgAddress" placeholder="朝阳区望京西园" oninput="app.saveUserInfo()"></div></div><div class="settings-about">v1.0.0 · 2026-06-04<br>Powered by 美团 Agent</div></div></div><!-- SHARE MODAL --><div class="modal-overlay" id="shareModal"><div class="modal-content" style="position:relative" id="shareContent"></di <script>/* 美团本地规划 Agent - v1.0.0 - 2026-06-04 */
const KEY_PREFIX='meituan_agent_';const app={state:{chatId:null,messages:[],loading:false,llmEnabled:false,conversations:[]},init(){this.loadConversations();this.loadUserInfo();this.checkStatus();const last=localStorage.getItem(KEY_PREFIX+'last_chat_id');if(last&&this.state.conversations.find(c=>c.id===last)){this.loadChat(last)}else if(this.state.conversations.length){this.loadChat(this.state.conversations[0].id)}else{this.newChat()}this.renderSidebar();this.updateAvatar()},esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML},checkStatus(){fetch('/api/status').then(r=>r.json()).then(d=>{this.state.llmEnabled=d.llm_enabled;document.getElementById('headerStatus').textContent=d.llm_enabled?'LLM 已连接 · 智能规划模式':'规则引擎模式 · 可在设置中配置LLM';document.getElementById('statusDot').className='status-dot '+(d.llm_enabled?'connected':'disconnected')}).catch(()=>{document.getElementById('headerStatus').textContent='后端未连接 · 请检查服务'})},loadConversations(){const raw=localStorage.getItem(KEY_PREFIX+'conversations');this.state.conversations=raw?JSON.parse(raw):[]},saveConversations(){localStorage.setItem(KEY_PREFIX+'conversations',JSON.stringify(this.state.conversations))},newChat(){this.state.chatId='chat_'+Date.now();this.state.messages=[];this.renderChat();this.renderSidebar();localStorage.setItem(KEY_PREFIX+'last_chat_id',this.state.chatId)},loadChat(id){const raw=localStorage.getItem(KEY_PREFIX+'msg_'+id);this.state.chatId=id;this.state.messages=raw?JSON.parse(raw):[];this.renderChat();this.renderSidebar();localStorage.setItem(KEY_PREFIX+'last_chat_id',id)},saveCurrentChat(){if(!this.state.chatId)return;localStorage.setItem(KEY_PREFIX+'msg_'+this.state.chatId,JSON.stringify(this.state.messages));let conv=this.state.conversations.find(c=>c.id===this.state.chatId);if(!conv){conv={id:this.state.chatId,title:'新对话',summary:'',time:new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})};this.state.conversations.unshift(conv)}const userMsgs=this.state.messages.filter(m=>m.role==='user');if(userMsgs.length){conv.title=userMsgs[0].content.slice(0,15);conv.summary=userMsgs[userMsgs.length-1].content.slice(0,20)}conv.time=new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});this.saveConversations();this.renderSidebar()},deleteChat(id,e){e&&e.stopPropagation();if(!confirm('确定删除此对话？'))return;this.state.conversations=this.state.conversations.filter(c=>c.id!==id);localStorage.removeItem(KEY_PREFIX+'msg_'+id);this.saveConversations();if(this.state.chatId===id){if(this.state.conversations.length)this.loadChat(this.state.conversations[0].id);else this.newChat()}else{this.renderSidebar()}},renderSidebar(){const list=document.getElementById('sidebarList');list.innerHTML=this.state.conversations.map(c=>`<div class="sidebar-item${c.id===this.state.chatId?' is-active':''}" onclick="app.loadChat('${c.id}')"><div class="sidebar-item-title">${this.esc(c.title)}</div><div class="sidebar-item-summary">${this.esc(c.summary||'')}</div><div class="sidebar-item-time">${this.esc(c.time||'')}</div><button class="delete-btn" onclick="app.deleteChat('${c.id}',event)">✕</button></div>`).join('')},renderChat(){const body=document.getElementById('chatBody');if(!this.state.messages.length){body.innerHTML=`<div class="welcome-state"><div class="welcome-icon">🗺️</div><div class="welcome-title">美团规划助手</div><div class="welcome-desc">告诉我你的出行需求，我来帮你规划一条完整的方案——去哪玩、去哪吃、怎么预约，一句话搞定。</div><div class="welcome-suggestions"><span class="suggestion-chip" onclick="app.fillSend('今天下午想和老婆孩子出去玩，别离家太远')">👨‍👩‍👧 亲子出行</span><span class="suggestion-chip" onclick="app.fillSend('周末4个朋友聚会，2男2女，想找个好玩的地方')">👫 朋友聚会</span><span class="suggestion-chip" onclick="app.fillSend('今晚想吃日料，2个人，帮我订位')">🍣 约会晚餐</span></div></div>`;return}body.innerHTML=this.state.messages.map(m=>{if(m.role==='user')return this.renderUserMsg(m);if(m.role==='assistant')return this.renderAgentMsg(m);if(m.role==='plan')return this.renderPlanCard(m);if(m.role==='exec')return this.renderExecStatus(m);return''}).join('');body.scrollTop=body.scrollHeight},renderUserMsg(m){const nick=localStorage.getItem(KEY_PREFIX+'nickname')||'我';return`<div class="msg-row is-user"><div class="msg-avatar user">${this.esc(nick[0])}</div><div><div class="msg-bubble">${this.esc(m.content)}</div><div class="msg-time">${m.time||''}</div></div></div>`},renderAgentMsg(m){return`<div class="msg-row is-agent"><div class="msg-avatar agent">团</div><div><div class="msg-bubble">${m.html||this.esc(m.content)}</div><div class="msg-time">${m.time||''}</div></div></div>`},renderPlanCard(m){const p=m.plan;if(!p)return'';const items=(p.items||[]).map((it,i)=>`<div class="timeline-item${i<2?' is-done':''}"><div class="timeline-dot"></div><div class="timeline-step-time">${this.esc(it.start_time)} - ${this.esc(it.end_time)}</div><div class="timeline-step-title">${this.esc(it.name)}</div><div class="timeline-step-desc">${this.esc(it.address||'')} · ¥${it.price||0}/人</div><span class="timeline-step-tag ${it.action==='预订'?'tag-orange':'tag-green'}">${this.esc(it.action||'到店')}</span></div>`).join('');const dur=p.start_time&&p.end_time?p.start_time+' ~ '+p.end_time:'';const pid='plan_'+m.planIdx;return`<div class="plan-card" id="${pid}"><div class="plan-card-header"><div class="plan-card-icon">📋</div><div class="plan-card-title">${this.esc(p.scene_type==='family'?'家庭出行方案':'朋友聚会方案')}</div><span class="plan-card-badge">${dur}</span></div>${p.total_budget?'<div class="plan-card-meta"><span>👥 '+p.people_count+'人</span><span>💰 预算约¥'+p.total_budget+'</span></div>':''}<div class="timeline">${items}</div>${p.notes?'<div style="margin-top:12px;font-size:12px;color:var(--muted);background:var(--surface-soft);padding:8px 12px;border-radius:var(--rounded-md)">💡 '+this.esc(p.notes)+'</div>':''}<div class="plan-actions"><button class="btn-execute" onclick="app.executePlan(${m.planIdx},this)"><span class="btn-shine"></span><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 8l4 4 8-8"/></svg>确认方案，一键安排</button><button class="btn-share" onclick="app.showShare(${m.planIdx})">📤 导出分享</button><button class="btn-copy" onclick="app.copyPlanText(${m.planIdx})">📋 复制文字</button><button class="btn-adjust" onclick="app.fillSend('帮我调整一下方案')">调整方案</button></div></div>`},renderExecStatus(m){const d=m.data;const items=(d.bookings||[]).map(b=>`<div class="exec-status-item"><div class="exec-status-icon ${b.success?'done':'fail'}">${b.success?'✓':'✕'}</div><span class="exec-status-text${b.success?' is-done':''}">${app.esc(b.name)} · ${b.success?(b.booking_id||'已安排'):'预约失败'}</span></div>`).join('');return`<div class="msg-row is-agent"><div class="msg-avatar agent">团</div><div><div class="msg-bubble">${this.esc(d.message||'安排完成！')}<div class="exec-status">${items}</div></div><div class="msg-time">${m.time||''}</div></div></div>`},fillSend(text){document.getElementById('chatInput').value=text;this.autoResize(document.getElementById('chatInput'));document.getElementById('chatInput').focus()},autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'},handleKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();this.handleSend()}},setLoading(v){this.state.loading=v;const btn=document.getElementById('sendBtn');const wrap=document.getElementById('inputWrapper');btn.disabled=v;wrap.classList.toggle('is-disabled',v)},async handleSend(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text||this.state.loading)return;input.value='';this.autoResize(input);const time=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});this.state.messages.push({role:'user',content:text,time});this.saveCurrentChat();this.renderChat();this.setLoading(true);this.showTyping();try{if(this.state.llmEnabled){const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:this.state.messages.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({role:m.role,content:m.content}))})});const data=await res.json();this.removeTyping();const planMatch=data.content.match(/<!--PLAN_JSON-->(.*?)<!--\/PLAN_JSON-->/s);if(planMatch){const plan=JSON.parse(planMatch[1]);const cleanContent=data.content.replace(/<!--PLAN_JSON-->.*?<!--\/PLAN_JSON-->/s,'').trim();if(cleanContent)this.state.messages.push({role:'assistant',content:cleanContent,time});const pidx=this.state.messages.length;this.state.messages.push({role:'plan',plan:plan,planIdx:pidx,time})}else{this.state.messages.push({role:'assistant',content:data.content,time})}}else{const parseRes=await fetch('/api/parse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input:text})});const intent=await parseRes.json();this.state.messages.push({role:'assistant',content:'好的，我来帮你规划方案~',time});const planRes=await fetch('/api/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({intent})});const plan=await planRes.json();this.removeTyping();const pidx=this.state.messages.length;this.state.messages.push({role:'plan',plan:plan,planIdx:pidx,time})}}catch(err){this.removeTyping();this.state.messages.push({role:'assistant',content:'抱歉，服务暂时不可用，请稍后重试。('+err.message+')',time})}this.setLoading(false);this.saveCurrentChat();this.renderChat()},showTyping(){const body=document.getElementById('chatBody');const el=document.createElement('div');el.id='typingIndicator';el.className='msg-row is-agent';el.innerHTML='<div class="msg-avatar agent">团</div><div class="typing-indicator"><div class="typing-dots"><span></span><span></span><span></span></div><span class="typing-text">正在思考中...</span></div>';body.appendChild(el);body.scrollTop=body.scrollHeight},removeTyping(){const el=document.getElementById('typingIndicator');if(el)el.remove()},async executePlan(idx,btn){if(btn.disabled)return;btn.disabled=true;btn.innerHTML='<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 8l4 4 8-8"/></svg> 安排中...';const planMsg=this.state.messages.find(m=>m.planIdx===idx);if(!planMsg)return;try{const res=await fetch('/api/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan:planMsg.plan})});const data=await res.json();btn.innerHTML='✓ 已安排完成';btn.style.background='var(--success)';const time=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});this.state.messages.push({role:'exec',data:data,time});this.saveCurrentChat();this.renderChat()}catch(e){btn.innerHTML='安排失败，点击重试';btn.style.background='#e74c3c';btn.disabled=false}},showShare(idx){const planMsg=this.state.messages.find(m=>m.planIdx===idx);if(!planMsg)return;const p=planMsg.plan;const url='https://mt.meituan.com/plan/share/'+Date.now().toString(36);const qr='https://api.qrserver.com/v1/create-qr-code/?size=160x160&color=cc785c&data='+encodeURIComponent(url);const items=(p.items||[]).map(it=>'• '+it.start_time+' '+it.name).join('<br>');document.getElementById('shareContent').innerHTML=`<button class="modal-close" onclick="app.closeShare()">✕</button><div style="text-align:center;margin-bottom:20px"><div style="font-size:18px;font-weight:600;color:var(--ink);margin-bottom:4px">分享行程方案</div><div style="font-size:13px;color:var(--muted-soft)">扫描二维码或复制链接查看完整行程</div></div><div style="background:#fff;border:1px solid var(--hairline);border-radius:12px;padding:16px;margin-bottom:20px"><div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px">📋 ${this.esc(p.scene_type==='family'?'家庭出行方案':'聚会方案')}</div><div style="font-size:12px;color:var(--muted);line-height:2">${items}</div></div><div style="display:flex;align-items:center;gap:20px;margin-bottom:20px"><div style="width:130px;height:130px;border:1px solid var(--hairline);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0"><img src="${qr}" style="width:110px;height:110px" onerror="this.outerHTML='<div style=&quot;font-size:11px;color:var(--muted);text-align:center&quot;>二维码</div>'"></div><div style="flex:1;font-size:12px;color:var(--muted);line-height:1.8">📱 扫码查看行程<br>打开微信/美团扫一扫即可在手机上查看完整行程</div></div><div style="display:flex;gap:10px"><button onclick="navigator.clipboard.writeText('${url}');this.textContent='✅ 已复制'" style="flex:1;padding:11px;border-radius:var(--rounded-md);border:1px solid var(--hairline);background:none;cursor:pointer;font-size:13px;color:var(--body)">📋 复制链接</button><button onclick="app.closeShare()" style="flex:1;padding:11px;border-radius:var(--rounded-md);border:none;background:var(--primary);color:#fff;cursor:pointer;font-size:13px">完成</button></div>`;document.getElementById('shareModal').classList.add('is-open')},closeShare(){document.getElementById('shareModal').classList.remove('is-open')},copyPlanText(idx){const planMsg=this.state.messages.find(m=>m.planIdx===idx);if(!planMsg)return;const p=planMsg.plan;let text=`📋 ${p.scene_type==='family'?'家庭出行方案':'朋友聚会方案'}\n时间：${p.start_time} ~ ${p.end_time}\n人数：${p.people_count}人\n预算：¥${p.total_budget||'-'}\n\n`;(p.items||[]).forEach((it,i)=>{text+=`${i+1}. ${it.start_time}-${it.end_time} ${it.name}\n   📍 ${it.address||''}\n   💰 ¥${it.price||0}/人 · ${it.action||'到店'}\n\n`});if(p.notes)text+='💡 '+p.notes;navigator.clipboard.writeText(text).then(()=>alert('已复制到剪贴板')).catch(()=>prompt('复制方案文字：',text))},toggleSidebar(show){const sb=document.getElementById('sidebar');const bd=document.getElementById('sidebarBackdrop');if(show){sb.classList.add('is-open');bd.classList.remove('is-hidden')}else{sb.classList.remove('is-open');bd.classList.add('is-hidden')}},openSettings(){document.getElementById('settingsModal').classList.add('is-open');document.getElementById('cfgBaseUrl').value=localStorage.getItem(KEY_PREFIX+'base_url')||'';document.getElementById('cfgApiKey').value=localStorage.getItem(KEY_PREFIX+'api_key')||'';document.getElementById('cfgModel').value=localStorage.getItem(KEY_PREFIX+'model')||'';document.getElementById('cfgNickname').value=localStorage.getItem(KEY_PREFIX+'nickname')||'';document.getElementById('cfgPhone').value=localStorage.getItem(KEY_PREFIX+'phone')||'';document.getElementById('cfgAddress').value=localStorage.getItem(KEY_PREFIX+'address')||''},closeSettings(){document.getElementById('settingsModal').classList.remove('is-open')},toggleKeyVis(){const el=document.getElementById('cfgApiKey');el.type=el.type==='password'?'text':'password'},saveConfig(){localStorage.setItem(KEY_PREFIX+'base_url',document.getElementById('cfgBaseUrl').value);localStorage.setItem(KEY_PREFIX+'api_key',document.getElementById('cfgApiKey').value);localStorage.setItem(KEY_PREFIX+'model',document.getElementById('cfgModel').value);this.checkStatus();alert('配置已保存')},saveUserInfo(){localStorage.setItem(KEY_PREFIX+'nickname',document.getElementById('cfgNickname').value);localStorage.setItem(KEY_PREFIX+'phone',document.getElementById('cfgPhone').value);localStorage.setItem(KEY_PREFIX+'address',document.getElementById('cfgAddress').value);this.updateAvatar()},loadUserInfo(){/* loaded on demand in openSettings */},updateAvatar(){const nick=localStorage.getItem(KEY_PREFIX+'nickname');document.getElementById('avatarBtn').textContent=nick?nick[0]:'团'}};document.addEventListener('DOMContentLoaded',()=>app.init());document.getElementById('settingsModal').addEventListener('click',function(e){if(e.target===this)app.closeSettings()});document.getElementById('shareModal').addEventListener('click',function(e){if(e.target===this)app.closeShare()});</script>
