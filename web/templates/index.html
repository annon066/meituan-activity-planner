<!-- 美团本地规划 Agent v2.0 - 2026-06-04 -->
<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美团本地规划 Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
:root {
  --primary: #cc785c;
  --primary-active: #a9583e;
  --primary-light: #f5e6df;
  --ink: #141413;
  --body: #3d3d3a;
  --muted: #6c6a64;
  --muted-soft: #8e8b82;
  --hairline: #e6dfd8;
  --canvas: #faf9f5;
  --surface-soft: #f5f0e8;
  --surface-card: #efe9de;
  --surface-dark: #181715;
  --on-primary: #ffffff;
  --on-dark: #faf9f5;
  --success: #5db872;
  --warning: #e8a55a;
  --rounded-sm: 6px;
  --rounded-md: 8px;
  --rounded-lg: 12px;
  --rounded-xl: 16px;
  --rounded-pill: 9999px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html,body{overflow:hidden;height:100%;}
body {
  background: var(--canvas);
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
.app-shell {
  width: 100vw; height: 100vh;
  display: grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
}
/* SIDEBAR */
.sidebar {
  grid-column: 1; grid-row: 1 / -1;
  background: var(--canvas);
  border-right: 1px solid var(--hairline);
  display: flex; flex-direction: column;
  transition: transform 0.3s;
}
.sidebar-header {
  padding: 24px 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--hairline);
}
.sidebar-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; color: var(--ink); }
.sidebar-close { display: none; background: none; border: none; cursor: pointer; color: var(--muted); }
.sidebar-new-btn {
  margin: 16px 20px; padding: 10px 16px;
  border-radius: var(--rounded-md); border: 1px dashed var(--hairline);
  background: transparent; color: var(--primary); font-size: 14px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
}
.sidebar-new-btn:hover { background: var(--primary-light); border-color: var(--primary); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
.sidebar-item {
  padding: 12px 14px; border-radius: var(--rounded-md); cursor: pointer;
  transition: background 0.15s; margin-bottom: 4px; position: relative;
}
.sidebar-item:hover { background: var(--surface-soft); }
.sidebar-item.is-active { background: var(--surface-card); }
.sidebar-item-title { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-item-summary { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-item-time { font-size: 11px; color: var(--muted-soft); margin-top: 4px; }
.sidebar-item-del {
  position: absolute; top: 8px; right: 8px; width: 22px; height: 22px;
  border-radius: 50%; border: none; background: var(--hairline); color: var(--muted);
  font-size: 12px; cursor: pointer; display: none; align-items: center; justify-content: center;
}
.sidebar-item:hover .sidebar-item-del { display: flex; }
/* HEADER */
.chat-header {
  grid-column: 2; grid-row: 1; height: 60px; padding: 0 32px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--hairline); background: var(--canvas);
}
.header-menu-btn { display: none; background: none; border: none; cursor: pointer; color: var(--ink); }
.header-title-group { flex: 1; min-width: 0; }
.header-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; color: var(--ink); }
.header-subtitle { font-size: 12px; color: var(--muted-soft); margin-top: 1px; }
.header-status { width: 8px; height: 8px; border-radius: 50%; background: var(--muted-soft); margin-right: 4px; }
.header-status.connected { background: var(--success); }
.header-avatar {
  width: 36px; height: 36px; border-radius: var(--rounded-pill);
  background: linear-gradient(135deg, var(--primary) 0%, var(--warning) 100%);
  display: flex; align-items: center; justify-content: center;
  color: var(--on-primary); font-size: 14px; font-weight: 600; cursor: pointer;
  transition: transform 0.2s;
}
.header-avatar:hover { transform: scale(1.1); }
/* CHAT BODY */
.chat-body {
  grid-column: 2; grid-row: 2; overflow-y: auto; padding: 32px 48px;
  display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth;
}
.chat-body::-webkit-scrollbar { width: 6px; }
.chat-body::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 3px; }
/* WELCOME */
.welcome-view { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; padding: 40px; }
.welcome-icon { font-size: 48px; margin-bottom: 16px; }
.welcome-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 500; color: var(--ink); margin-bottom: 8px; }
.welcome-desc { font-size: 14px; color: var(--muted); max-width: 400px; line-height: 1.7; margin-bottom: 24px; }
/* MSG */
.msg-row { display: flex; gap: 12px; align-items: flex-start; animation: msgFadeIn 0.4s ease; max-width: 720px; }
@keyframes msgFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-row.is-user { flex-direction: row-reverse; margin-left: auto; }
.msg-avatar { width: 34px; height: 34px; border-radius: var(--rounded-pill); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
.msg-avatar.agent { background: var(--surface-card); color: var(--primary); }
.msg-avatar.user { background: var(--primary); color: var(--on-primary); }
.msg-bubble { max-width: 560px; padding: 14px 18px; border-radius: var(--rounded-xl); font-size: 14px; line-height: 1.65; word-break: break-word; }
.msg-row.is-user .msg-bubble { background: var(--primary); color: var(--on-primary); border-bottom-right-radius: 4px; }
.msg-row.is-agent .msg-bubble { background: var(--surface-soft); color: var(--body); border-bottom-left-radius: 4px; }
.msg-time { font-size: 11px; color: var(--muted-soft); margin-top: 4px; text-align: right; }
.msg-row.is-agent .msg-time { text-align: left; }
/* PLAN CARD */
.plan-card { background: var(--on-primary); border: 1px solid var(--hairline); border-radius: var(--rounded-xl); padding: 24px; margin-top: 8px; max-width: 560px; box-shadow: 0 2px 16px rgba(20,20,19,0.05); }
.plan-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.plan-card-icon { width: 32px; height: 32px; border-radius: var(--rounded-md); background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 15px; }
.plan-card-title { font-size: 16px; font-weight: 600; color: var(--ink); }
.plan-card-badge { font-size: 11px; font-weight: 500; color: var(--primary); background: var(--primary-light); padding: 2px 10px; border-radius: var(--rounded-pill); margin-left: auto; }
.timeline { position: relative; padding-left: 28px; }
.timeline::before { content: ''; position: absolute; left: 9px; top: 4px; bottom: 4px; width: 2px; background: var(--hairline); border-radius: 1px; }
.timeline-item { position: relative; padding-bottom: 20px; }
.timeline-item:last-child { padding-bottom: 0; }
.timeline-dot { position: absolute; left: -23px; top: 3px; width: 14px; height: 14px; border-radius: var(--rounded-pill); border: 2px solid var(--primary); background: var(--canvas); z-index: 1; }
.timeline-step-time { font-size: 12px; font-weight: 600; color: var(--primary); margin-bottom: 2px; }
.timeline-step-title { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 3px; }
.timeline-step-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
.timeline-step-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--rounded-pill); margin-top: 6px; font-weight: 500; }
.tag-green { background: #e8f5ec; color: var(--success); }
.tag-orange { background: #fef3e2; color: #c07a1e; }
.plan-actions { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--hairline); display: flex; gap: 12px; flex-wrap: wrap; }
.btn-execute {
  flex: 1; padding: 12px 24px; border-radius: var(--rounded-md); border: none;
  background: var(--primary); color: var(--on-primary); font-size: 14px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.btn-execute:hover { background: var(--primary-active); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(204,120,92,0.3); }
.btn-execute:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-execute .btn-shine { position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); animation: shine 3s infinite; }
@keyframes shine { 0% { left: -100%; } 50%,100% { left: 100%; } }
.btn-secondary {
  padding: 12px 16px; border-radius: var(--rounded-md); border: 1px solid var(--hairline);
  background: transparent; color: var(--muted); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
/* INPUT */
.chat-input-area { grid-column: 2; grid-row: 3; padding: 16px 48px 24px; border-top: 1px solid var(--hairline); background: var(--canvas); }
.input-wrapper {
  display: flex; align-items: flex-end; gap: 12px;
  background: var(--surface-soft); border: 1px solid var(--hairline);
  border-radius: var(--rounded-xl); padding: 10px 16px; max-width: 720px; margin: 0 auto;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(204,120,92,0.1); }
.input-wrapper.disabled { opacity: 0.6; pointer-events: none; }
.chat-input {
  flex: 1; border: none; background: transparent; font-size: 14px; color: var(--ink);
  outline: none; font-family: inherit; line-height: 1.4; resize: none;
  max-height: 120px; min-height: 22px;
}
.chat-input::placeholder { color: var(--muted-soft); }
.send-btn {
  width: 36px; height: 36px; border-radius: var(--rounded-pill); border: none;
  background: var(--primary); color: var(--on-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
}
.send-btn:hover { background: var(--primary-active); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.input-hint { font-size: 11px; color: var(--muted-soft); text-align: center; margin-top: 8px; }
/* SUGGESTIONS */
.suggestions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.suggestion-chip { padding: 6px 14px; border-radius: var(--rounded-pill); border: 1px solid var(--hairline); background: var(--on-primary); font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.suggestion-chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
/* TYPING */
.typing-indicator { display: flex; align-items: center; gap: 6px; padding: 8px 0; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted-soft); animation: typingBounce 1.4s infinite ease-in-out; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
.typing-text { font-size: 12px; color: var(--muted-soft); }
/* EXEC STATUS */
.exec-status { margin-top: 12px; padding: 12px 14px; background: #f0faf2; border-radius: var(--rounded-md); border: 1px solid #d4edda; }
.exec-status-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
.exec-status-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
.exec-status-icon.done { background: var(--success); color: white; }
.exec-status-icon.pending { background: var(--warning); color: white; }
/* SETTINGS MODAL */
.modal-overlay { position: fixed; inset: 0; z-index: 9999; display: none; align-items: center; justify-content: center; background: rgba(20,20,19,0.45); backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal-panel { background: var(--canvas); border-radius: 16px; padding: 32px; width: 440px; max-width: 90vw; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(20,20,19,0.18); animation: slideUp 0.3s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-title { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
.settings-section { margin-bottom: 24px; }
.settings-section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.settings-field { margin-bottom: 12px; }
.settings-label { font-size: 13px; color: var(--body); margin-bottom: 4px; display: block; }
.settings-input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--hairline); border-radius: var(--rounded-md);
  background: var(--surface-soft); font-size: 13px; color: var(--ink); outline: none; font-family: inherit;
}
.settings-input:focus { border-color: var(--primary); }
.settings-btn {
  padding: 10px 20px; border-radius: var(--rounded-md); border: none;
  background: var(--primary); color: var(--on-primary); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.settings-btn:hover { background: var(--primary-active); }
.settings-status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-left: 12px; }
.settings-status .dot { width: 8px; height: 8px; border-radius: 50%; }
.settings-status .dot.on { background: var(--success); }
.settings-status .dot.off { background: var(--muted-soft); }
/* ONBOARDING CONFIG CARD */
.onboarding-config-card { margin-top: 12px; padding: 14px; background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--rounded-lg); }
.onboarding-config-card .settings-field { margin-bottom: 8px; }
.onboarding-config-card .settings-input { font-size: 12px; padding: 8px 10px; }
/* MOBILE */
@media (max-width: 768px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; z-index: 1000; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-backdrop { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 999; }
  .sidebar-backdrop.hidden { display: none; }
  .sidebar-close { display: block; }
  .header-menu-btn { display: flex; }
  .chat-body { padding: 20px 16px; }
  .chat-input-area { padding: 12px 16px 16px; }
  .plan-card { max-width: 100%; }
  .msg-row { max-width: 100%; }
}
</style>
</head>
<body>
<div class="app-shell">
  <!-- SIDEBAR -->
  <div class="sidebar-backdrop hidden" id="sidebarBackdrop" onclick="App.toggleSidebar(false)"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">对话记录</span>
      <button class="sidebar-close" onclick="App.toggleSidebar(false)">&#10005;</button>
    </div>
    <button class="sidebar-new-btn" onclick="App.newConversation()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"></path></svg>
      新建对话
    </button>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <!-- HEADER -->
  <header class="chat-header">
    <button class="header-menu-btn" onclick="App.toggleSidebar(true)">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 5h14M3 10h14M3 15h10"></path></svg>
    </button>
    <div class="header-title-group">
      <div class="header-title">美团规划助手</div>
      <div class="header-subtitle"><span class="header-status" id="statusDot"></span>帮你把事情做完，不只是搜索</div>
    </div>
    <div class="header-avatar" id="avatarBtn" onclick="App.openSettings()">团</div>
  </header>

  <!-- CHAT BODY -->
  <div class="chat-body" id="chatBody"></div>

  <!-- INPUT -->
  <div class="chat-input-area">
    <div class="input-wrapper" id="inputWrapper">
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="告诉我你想怎么安排..." onkeydown="App.handleKeydown(event)" oninput="App.autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="App.handleSend()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2.5 2.1l11.7 5.5c.4.2.4.6 0 .8L2.5 13.9c-.5.2-.9-.1-.8-.6l1.2-4.5h5.3a.4.4 0 000-.8H2.9L1.7 3.5c-.1-.5.3-.9.8-.6z"/></svg>
      </button>
    </div>
    <div class="input-hint">基于你的位置和偏好智能规划 · Shift+Enter 换行</div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-panel">
    <div class="modal-title">设置<button class="modal-close" onclick="App.closeSettings()">&#10005;</button></div>
    <div class="settings-section">
      <div class="settings-section-title">API 配置</div>
      <div class="settings-field"><label class="settings-label">Base URL</label><input class="settings-input" id="cfgBaseUrl" placeholder="https://api.openai.com/v1"></div>
      <div class="settings-field"><label class="settings-label">API Key</label><input class="settings-input" id="cfgApiKey" type="password" placeholder="sk-..."></div>
      <div class="settings-field"><label class="settings-label">模型</label><input class="settings-input" id="cfgModel" placeholder="gpt-4o"></div>
      <div style="display:flex;align-items:center;margin-top:8px;">
        <button class="settings-btn" onclick="App.saveConfig()">保存并测试</button>
        <span class="settings-status" id="cfgStatus"><span class="dot off"></span>未连接</span>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">用户信息</div>
      <div class="settings-field"><label class="settings-label">昵称</label><input class="settings-input" id="cfgNickname" placeholder="小明" onchange="App.saveUserInfo()"></div>
      <div class="settings-field"><label class="settings-label">手机号</label><input class="settings-input" id="cfgPhone" placeholder="138****8888" onchange="App.saveUserInfo()"></div>
      <div class="settings-field"><label class="settings-label">常用出发地</label><input class="settings-input" id="cfgAddress" placeholder="朝阳区望京西园" onchange="App.saveUserInfo()"></div>
    </div>
    <div style="font-size:12px;color:var(--muted-soft);text-align:center;margin-top:16px;">v2.0 · Powered by 美团 Agent</div>
  </div>
</div>

<!-- PLACEHOLDER_JS -->
<script>
const App = {
  KEY_PREFIX: 'meituan_agent_',
  conversations: [],
  currentId: null,
  messages: [],
  llmEnabled: false,
  currentPlan: null,
  loading: false,
  onboardingStep: null,
  onboardingData: {},

  init() {
    this.loadConversations();
    this.checkStatus().then(() => {
      this.loadConfig();
      // 首次启动检测
      const onboarded = localStorage.getItem(this.KEY_PREFIX + 'onboarded');
      const existingInfo = JSON.parse(localStorage.getItem(this.KEY_PREFIX + 'userinfo') || '{}');
      if (!onboarded && !existingInfo.nickname) {
        this.startOnboarding();
        return;
      }
      if (!onboarded && existingInfo.nickname) {
        localStorage.setItem(this.KEY_PREFIX + 'onboarded', '1');
      }
      if (this.conversations.length === 0) {
        this.newConversation();
      } else {
        this.switchConversation(this.conversations[0].id);
      }
    });
  },

  esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  },

  now() { return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}); },

  scrollBottom() { const el = document.getElementById('chatBody'); el.scrollTop = el.scrollHeight; },

  autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; },

  setLoading(on) {
    this.loading = on;
    document.getElementById('sendBtn').disabled = on;
    document.getElementById('inputWrapper').classList.toggle('disabled', on);
  },

  // === STATUS ===
  async checkStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      this.llmEnabled = d.llm_enabled;
      const dot = document.getElementById('statusDot');
      dot.classList.toggle('connected', d.llm_enabled);
    } catch(e) {}
  },

  // === SIDEBAR ===
  toggleSidebar(show) {
    document.getElementById('sidebar').classList.toggle('open', show);
    document.getElementById('sidebarBackdrop').classList.toggle('hidden', !show);
  },

  loadConversations() {
    const raw = localStorage.getItem(this.KEY_PREFIX + 'conversations');
    this.conversations = raw ? JSON.parse(raw) : [];
  },

  saveConversations() {
    localStorage.setItem(this.KEY_PREFIX + 'conversations', JSON.stringify(this.conversations));
  },

  renderSidebar() {
    const list = document.getElementById('sidebarList');
    list.innerHTML = this.conversations.map(c => `
      <div class="sidebar-item ${c.id === this.currentId ? 'is-active' : ''}" onclick="App.switchConversation('${c.id}')">
        <div class="sidebar-item-title">${this.esc(c.title)}</div>
        <div class="sidebar-item-summary">${this.esc(c.summary || '')}</div>
        <div class="sidebar-item-time">${c.time || ''}</div>
        <button class="sidebar-item-del" onclick="event.stopPropagation();App.deleteConversation('${c.id}')">&#10005;</button>
      </div>
    `).join('');
  },

  newConversation() {
    const id = 'conv_' + Date.now();
    this.conversations.unshift({ id, title: '新对话', summary: '', time: this.now(), messages: [] });
    this.saveConversations();
    this.switchConversation(id);
  },

  switchConversation(id) {
    this.currentId = id;
    const conv = this.conversations.find(c => c.id === id);
    this.messages = conv ? conv.messages.slice() : [];
    this.currentPlan = null;
    this.renderChat();
    this.renderSidebar();
    this.toggleSidebar(false);
  },

  deleteConversation(id) {
    this.conversations = this.conversations.filter(c => c.id !== id);
    this.saveConversations();
    if (id === this.currentId) {
      if (this.conversations.length) this.switchConversation(this.conversations[0].id);
      else this.newConversation();
    } else {
      this.renderSidebar();
    }
  },

  saveCurrentConv() {
    const conv = this.conversations.find(c => c.id === this.currentId);
    if (!conv) return;
    conv.messages = this.messages.slice();
    conv.time = this.now();
    const firstUser = this.messages.find(m => m.role === 'user');
    if (firstUser) {
      conv.title = firstUser.content.slice(0, 15) || '新对话';
    }
    conv.summary = (this.messages[this.messages.length - 1]?.content || '').slice(0, 30);
    this.saveConversations();
    this.renderSidebar();
  },

  // === CHAT RENDER ===
  renderChat() {
    const body = document.getElementById('chatBody');
    if (this.messages.length === 0) {
      body.innerHTML = `
        <div class="welcome-view">
          <div class="welcome-icon">&#x1F44B;</div>
          <div class="welcome-title">美团规划助手</div>
          <div class="welcome-desc">告诉我你的需求，我会帮你规划活动、找餐厅、安排预订。<br>比如：「今天下午想和老婆孩子出去玩」</div>
          <div class="suggestions">
            <span class="suggestion-chip" onclick="App.fillSuggestion(this)">下午带孩子出去玩</span>
            <span class="suggestion-chip" onclick="App.fillSuggestion(this)">周末朋友聚会安排</span>
            <span class="suggestion-chip" onclick="App.fillSuggestion(this)">和女朋友约会</span>
          </div>
        </div>`;
      return;
    }
    body.innerHTML = '';
    for (const msg of this.messages) {
      if (msg.role === 'user') this._appendUserMsg(msg.content);
      else this._appendAgentMsg(msg.content);
    }
    this.scrollBottom();
  },

  _appendUserMsg(text) {
    const body = document.getElementById('chatBody');
    const row = document.createElement('div');
    row.className = 'msg-row is-user';
    row.innerHTML = `<div class="msg-avatar user">我</div><div><div class="msg-bubble">${this.esc(text)}</div></div>`;
    body.appendChild(row);
  },

  _appendAgentMsg(html) {
    const body = document.getElementById('chatBody');
    const row = document.createElement('div');
    row.className = 'msg-row is-agent';
    row.innerHTML = `<div class="msg-avatar agent" style="border:1.5px solid rgba(204,120,92,0.18)">团</div><div><div class="msg-bubble">${html}</div></div>`;
    body.appendChild(row);
  },

  addLiveAgentMsg(html) {
    const body = document.getElementById('chatBody');
    const row = document.createElement('div');
    row.className = 'msg-row is-agent';
    row.innerHTML = `<div class="msg-avatar agent" style="border:1.5px solid rgba(204,120,92,0.18)">团</div><div><div class="msg-bubble">${html}</div><div class="msg-time">${this.now()}</div></div>`;
    body.appendChild(row);
    this.scrollBottom();
    return row;
  },

  showTyping() {
    const body = document.getElementById('chatBody');
    const row = document.createElement('div');
    row.className = 'msg-row is-agent';
    row.id = 'typingRow';
    row.innerHTML = `<div class="msg-avatar agent">团</div><div class="typing-indicator"><div class="typing-dots"><span></span><span></span><span></span></div><span class="typing-text">正在规划中...</span></div>`;
    body.appendChild(row);
    this.scrollBottom();
    return row;
  },

  fillSuggestion(chip) {
    const input = document.getElementById('chatInput');
    input.value = chip.textContent;
    input.focus();
  },

  // === SEND ===
  handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.handleSend(); }
  },

  async handleSend() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || this.loading) return;
    input.value = '';
    input.style.height = 'auto';

    // 引导模式：路由到引导处理
    if (this.onboardingStep !== null) {
      this.handleOnboardingInput(text);
      return;
    }

    this.messages.push({role: 'user', content: text});
    this.renderChat();
    this.saveCurrentConv();
    const typing = this.showTyping();
    this.setLoading(true);

    try {
      if (this.llmEnabled) {
        const apiMessages = this.messages.filter(m => !m._html).map(m => ({role: m.role, content: m.content}));
        const res = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({messages: apiMessages})});
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        typing.remove();
        const planMatch = data.content.match(/<!--PLAN_JSON-->([\s\S]*?)<!--\/PLAN_JSON-->/);
        if (planMatch) {
          const plan = JSON.parse(planMatch[1]);
          this.currentPlan = plan;
          const displayText = data.content.replace(/<!--PLAN_JSON-->[\s\S]*?<!--\/PLAN_JSON-->/, '').trim();
          if (displayText) { this.messages.push({role:'assistant', content: displayText}); this.addLiveAgentMsg(this.esc(displayText).replace(/\n/g,'<br>')); }
          const cardHtml = this.buildPlanCard(plan);
          this.messages.push({role:'assistant', content: data.content, _html: cardHtml});
          this.addLiveAgentMsg(cardHtml);
        } else {
          this.messages.push({role:'assistant', content: data.content});
          this.addLiveAgentMsg(this.esc(data.content).replace(/\n/g,'<br>'));
        }
      } else {
        const intentRes = await fetch('/api/parse', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({input: text})});
        const intent = await intentRes.json();
        if (intent.error) throw new Error(intent.error);
        const planRes = await fetch('/api/plan', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({intent})});
        const plan = await planRes.json();
        this.currentPlan = plan;
        typing.remove();
        const needsInfo = intent.special_needs?.length ? `，已考虑「${intent.special_needs.join('、')}」` : '';
        const introText = `好的！${intent.people_count}人${needsInfo}，时间 ${intent.time_range[0]}-${intent.time_range[1]}，方案如下：`;
        this.messages.push({role:'assistant', content: introText});
        this.addLiveAgentMsg(this.esc(introText));
        const cardHtml = this.buildPlanCard(plan);
        this.messages.push({role:'assistant', content: JSON.stringify(plan), _html: cardHtml});
        this.addLiveAgentMsg(cardHtml);
      }
    } catch(e) {
      typing.remove();
      const errMsg = '抱歉，出了点问题：' + (e.message || '网络错误') + '，请重试~';
      this.messages.push({role:'assistant', content: errMsg});
      this.addLiveAgentMsg(this.esc(errMsg));
    }
    this.setLoading(false);
    this.saveCurrentConv();
  },

  // === PLAN CARD ===
  buildPlanCard(plan) {
    const sceneNames = {family:'家庭亲子方案', friends:'朋友聚会方案'};
    const duration = plan.duration_hours || 4;
    const items = (plan.items||[]).map(item => {
      const emoji = item.venue_type === 'restaurant' ? '&#x1F37D;&#xFE0F;' : '&#x1F3A0;';
      const tag = item.action === '预订' ? '<span class="timeline-step-tag tag-orange">需预约</span>' : '<span class="timeline-step-tag tag-green">直接到店</span>';
      return `<div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-step-time">${this.esc(item.start_time)} - ${this.esc(item.end_time)}</div><div class="timeline-step-title">${emoji} ${this.esc(item.name)}</div><div class="timeline-step-desc">${this.esc(item.address)} · 人均&yen;${item.price}</div>${tag}</div>`;
    }).join('');
    return `<div class="plan-card">
      <div class="plan-card-header"><div class="plan-card-icon">&#x1F4CB;</div><div class="plan-card-title">${sceneNames[plan.scene_type]||'活动方案'}</div><span class="plan-card-badge">${duration}h · &yen;${plan.total_budget}</span></div>
      <div class="timeline">${items}</div>
      <div class="plan-actions">
        <button class="btn-execute" onclick="App.handleExecute(this)"><span class="btn-shine"></span>&#10003; 确认方案，一键安排</button>
        <button class="btn-secondary" onclick="App.copyPlanText()">&#x1F4CB; 复制文字版</button>
        <button class="btn-secondary" onclick="App.showShareModal()">&#x1F517; 分享</button>
      </div>
    </div>`;
  },

  // === EXECUTE ===
  async handleExecute(btn) {
    if (!this.currentPlan || btn.disabled) return;
    btn.disabled = true;
    btn.innerHTML = '&#10003; 安排中...';
    btn.style.background = 'var(--primary-active)';
    try {
      if (this.llmEnabled) {
        this.messages.push({role:'user', content:'确认方案，帮我预订'});
        const res = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({messages: this.messages.filter(m=>!m._html).map(m=>({role:m.role,content:m.content}))})});
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        this.messages.push({role:'assistant', content: data.content});
        btn.innerHTML = '&#10003; 已安排完成';
        btn.style.background = 'var(--success)';
        this.addLiveAgentMsg(this.esc(data.content.replace(/<!--PLAN_JSON-->[\s\S]*?<!--\/PLAN_JSON-->/,'')).replace(/\n/g,'<br>'));
      } else {
        const res = await fetch('/api/execute', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({plan: this.currentPlan})});
        const result = await res.json();
        btn.innerHTML = '&#10003; 已安排完成';
        btn.style.background = 'var(--success)';
        const statusHtml = result.bookings.map(b => {
          const icon = b.success ? '<div class="exec-status-icon done">&#10003;</div>' : '<div class="exec-status-icon pending">&#10005;</div>';
          const text = b.success ? `${this.esc(b.name)} · 已预约（${b.booking_id}）` : `${this.esc(b.name)} · 预约失败`;
          return `<div class="exec-status-item">${icon}<span class="exec-status-text">${text}</span></div>`;
        }).join('');
        this.addLiveAgentMsg(`全部安排好了！<div class="exec-status">${statusHtml}</div>`);
      }
    } catch(e) {
      btn.innerHTML = '重试';
      btn.style.background = 'var(--warning)';
      btn.disabled = false;
    }
    this.saveCurrentConv();
  },

  copyPlanText() {
    if (!this.currentPlan) return;
    const lines = this.currentPlan.items.map((item, i) =>
      `${i+1}. ${item.start_time}-${item.end_time} ${item.name}\n   ${item.address} · 人均¥${item.price}`
    );
    const text = `活动方案（预算¥${this.currentPlan.total_budget}）\n\n${lines.join('\n\n')}`;
    navigator.clipboard.writeText(text).catch(() => prompt('复制方案：', text));
  },

  // === SETTINGS ===
  openSettings() {
    document.getElementById('settingsModal').classList.add('show');
    const info = JSON.parse(localStorage.getItem(this.KEY_PREFIX + 'userinfo') || '{}');
    document.getElementById('cfgNickname').value = info.nickname || '';
    document.getElementById('cfgPhone').value = info.phone || '';
    document.getElementById('cfgAddress').value = info.address || '';
    this.loadConfig();
  },

  closeSettings() { document.getElementById('settingsModal').classList.remove('show'); },

  async loadConfig() {
    try {
      const res = await fetch('/api/config');
      const d = await res.json();
      document.getElementById('cfgBaseUrl').value = d.base_url || '';
      document.getElementById('cfgModel').value = d.model || '';
      const statusEl = document.getElementById('cfgStatus');
      if (d.has_key) { statusEl.innerHTML = '<span class="dot on"></span>已连接'; }
      else { statusEl.innerHTML = '<span class="dot off"></span>未连接'; }
    } catch(e) {}
  },

  async saveConfig() {
    const body = {
      base_url: document.getElementById('cfgBaseUrl').value.trim(),
      api_key: document.getElementById('cfgApiKey').value.trim(),
      model: document.getElementById('cfgModel').value.trim()
    };
    try {
      const res = await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
      const d = await res.json();
      const statusEl = document.getElementById('cfgStatus');
      if (d.llm_enabled) {
        statusEl.innerHTML = '<span class="dot on"></span>已连接';
        this.llmEnabled = true;
      } else {
        statusEl.innerHTML = '<span class="dot off"></span>未连接';
        this.llmEnabled = false;
      }
      document.getElementById('statusDot').classList.toggle('connected', this.llmEnabled);
    } catch(e) {
      document.getElementById('cfgStatus').innerHTML = '<span class="dot off"></span>保存失败';
    }
  },

  saveUserInfo() {
    const info = {
      nickname: document.getElementById('cfgNickname').value,
      phone: document.getElementById('cfgPhone').value,
      address: document.getElementById('cfgAddress').value
    };
    localStorage.setItem(this.KEY_PREFIX + 'userinfo', JSON.stringify(info));
    fetch('/api/userinfo', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(info)}).catch(()=>{});
  },

  // === ONBOARDING ===
  startOnboarding() {
    this.onboardingStep = 0;
    this.onboardingData = {};
    const body = document.getElementById('chatBody');
    body.innerHTML = '';
    this._addOnboardingBot('你好！我是你的规划助手，很高兴认识你。怎么称呼你？');
    document.getElementById('chatInput').placeholder = '输入你的昵称...';
    document.getElementById('chatInput').focus();
  },

  handleOnboardingInput(text) {
    this._addOnboardingUser(text);
    switch (this.onboardingStep) {
      case 0:
        this.onboardingData.nickname = text;
        this.onboardingStep = 1;
        setTimeout(() => {
          this._addOnboardingBot(`很高兴认识你，${this.esc(text)}！为了给你规划最方便的路线，你平时从哪里出发？（比如小区名或地铁站）`);
          document.getElementById('chatInput').placeholder = '输入常用出发地...';
        }, 400);
        break;
      case 1:
        this.onboardingData.address = text;
        this.onboardingStep = 2;
        setTimeout(() => {
          this._addOnboardingBot('如果需要帮你预约餐厅，可以留个手机号。<span class="suggestion-chip" style="margin-left:8px;" onclick="App.skipOnboardingStep()">跳过</span>');
          document.getElementById('chatInput').placeholder = '输入手机号或点击跳过...';
        }, 400);
        break;
      case 2:
        this.onboardingData.phone = text;
        this._advanceToConfigOrFinish();
        break;
    }
  },

  skipOnboardingStep() {
    if (this.onboardingStep === 2) {
      this.onboardingData.phone = '';
      this._addOnboardingUser('跳过');
      this._advanceToConfigOrFinish();
    } else if (this.onboardingStep === 3) {
      this._addOnboardingUser('稍后配置');
      this.finishOnboarding();
    }
  },

  _advanceToConfigOrFinish() {
    if (!this.llmEnabled) {
      this.onboardingStep = 3;
      setTimeout(() => {
        this._addOnboardingBot(`最后一步！配置 AI 接口就能用智能规划了。<div class="onboarding-config-card">
          <div class="settings-field"><label class="settings-label">Base URL</label><input class="settings-input" id="obBaseUrl" placeholder="https://api.openai.com/v1"></div>
          <div class="settings-field"><label class="settings-label">API Key</label><input class="settings-input" id="obApiKey" type="password" placeholder="sk-..."></div>
          <div class="settings-field"><label class="settings-label">模型</label><input class="settings-input" id="obModel" placeholder="DeepSeek-V4-Flash" value="DeepSeek-V4-Flash"></div>
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="settings-btn" onclick="App.saveOnboardingConfig()">保存并连接</button>
            <span class="suggestion-chip" onclick="App.skipOnboardingStep()">稍后配置</span>
          </div>
        </div>`);
      }, 400);
    } else {
      this.finishOnboarding();
    }
  },

  async saveOnboardingConfig() {
    const body = {
      base_url: document.getElementById('obBaseUrl').value.trim(),
      api_key: document.getElementById('obApiKey').value.trim(),
      model: document.getElementById('obModel').value.trim()
    };
    try {
      const res = await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
      const d = await res.json();
      this.llmEnabled = d.llm_enabled;
      document.getElementById('statusDot').classList.toggle('connected', this.llmEnabled);
    } catch(e) {}
    this.finishOnboarding();
  },

  async finishOnboarding() {
    // 保存到 localStorage
    const info = this.onboardingData;
    localStorage.setItem(this.KEY_PREFIX + 'userinfo', JSON.stringify(info));
    localStorage.setItem(this.KEY_PREFIX + 'onboarded', '1');
    // 同步到后端
    try {
      await fetch('/api/userinfo', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(info)});
    } catch(e) {}
    // 完成提示
    this.onboardingStep = null;
    setTimeout(() => {
      this._addOnboardingBot(`全部搞定！有什么想安排的尽管告诉我。<div class="suggestions" style="margin-top:12px;">
        <span class="suggestion-chip" onclick="App.finishOnboardingAndFill(this)">下午带孩子出去玩</span>
        <span class="suggestion-chip" onclick="App.finishOnboardingAndFill(this)">周末朋友聚会安排</span>
        <span class="suggestion-chip" onclick="App.finishOnboardingAndFill(this)">和女朋友约会</span>
      </div>`);
    }, 400);
  },

  finishOnboardingAndFill(chip) {
    this.newConversation();
    const input = document.getElementById('chatInput');
    input.value = chip.textContent;
    input.focus();
  },

  _addOnboardingBot(html) {
    const body = document.getElementById('chatBody');
    const row = document.createElement('div');
    row.className = 'msg-row is-agent';
    row.innerHTML = `<div class="msg-avatar agent" style="border:1.5px solid rgba(204,120,92,0.18)">团</div><div><div class="msg-bubble">${html}</div></div>`;
    body.appendChild(row);
    this.scrollBottom();
  },

  _addOnboardingUser(text) {
    const body = document.getElementById('chatBody');
    const row = document.createElement('div');
    row.className = 'msg-row is-user';
    row.innerHTML = `<div class="msg-avatar user">我</div><div><div class="msg-bubble">${this.esc(text)}</div></div>`;
    body.appendChild(row);
    this.scrollBottom();
  },

  // === SHARE ===
  showShareModal() {
    if (!this.currentPlan) return;
    const text = this.currentPlan.items.map(i => `${i.start_time} ${i.name}`).join(' → ');
    const url = 'https://mt.meituan.com/plan/' + Date.now().toString(36);
    const msg = `我的活动方案：${text}\n查看详情：${url}`;
    if (navigator.share) { navigator.share({title:'活动方案', text: msg}); }
    else { navigator.clipboard.writeText(msg).then(()=>alert('方案已复制到剪贴板')).catch(()=>prompt('复制分享：',msg)); }
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());
document.getElementById('settingsModal').addEventListener('click', function(e) { if (e.target === this) App.closeSettings(); });
</script>
</body></html>
